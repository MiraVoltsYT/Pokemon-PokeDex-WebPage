<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pokémon Pro Engine - Final Edition</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }
        #game-box { width: 650px; background: #9bbc0f; border: 8px solid #0f380f; padding: 10px; color: #000; box-shadow: 0 0 20px #000; position: relative; }
        
        /* Stats & HP */
        .stats { background: #cadc9f; border: 2px solid #0f380f; padding: 5px; width: 200px; font-size: 10px; font-weight: bold; margin-bottom: 5px; }
        .hp-bg { background: #0f380f; height: 8px; width: 100%; margin: 2px 0; }
        .hp-fill { background: #8bac0f; height: 100%; width: 100%; transition: width 0.4s; }

        /* Arena */
        .arena { height: 320px; position: relative; background: #8bac0f; border-bottom: 4px double #0f380f; display: flex; justify-content: space-around; align-items: flex-end; padding-bottom: 20px; overflow: hidden; }
        .side { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .sprite { width: 120px; image-rendering: pixelated; }
        
        /* Dead Pulse Animation */
        @keyframes pulseDead { 0% { opacity: 1; color: #700000; } 50% { opacity: 0.3; color: #ff0000; } 100% { opacity: 1; color: #700000; } }
        .dead-text { font-weight: bold; animation: pulseDead 1.5s infinite; }

        /* Menus */
        #menu { background: #cadc9f; border: 4px double #0f380f; padding: 10px; height: 180px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .menu-pane { max-height: 140px; overflow-y: auto; padding: 5px; }
        button { border: 2px solid #0f380f; background: #8bac0f; padding: 10px; font-weight: bold; cursor: pointer; font-family: inherit; font-size: 11px; }
        button:disabled { background: #666; cursor: not-allowed; opacity: 0.7; }
        
        #log { font-size: 13px; height: 50px; border-bottom: 1px solid #0f380f; margin-bottom: 8px; overflow-y: auto; white-space: pre-line; }
        
        /* Setup Screen */
        .setup-pane { text-align: center; padding: 20px; background: #cadc9f; border: 4px double #0f380f; color: #000; }
        select, input { padding: 5px; border: 2px solid #0f380f; background: #cadc9f; font-family: inherit; margin: 5px; }
        
        .db-link { margin-top: 20px; color: #8bac0f; text-decoration: none; font-weight: bold; border: 2px solid #8bac0f; padding: 10px; transition: 0.3s; }
        .db-link:hover { background: #8bac0f; color: #1a1a1a; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-box">
    <div id="setup-screen" class="setup-pane">
        <h1>POKÉMON PRO ENGINE</h1>
        <div style="margin: 15px 0;">
            <label>Mode:</label>
            <select id="battle-mode">
                <option value="1">1 vs 1 (Singles)</option>
                <option value="2">2 vs 2 (Doubles)</option>
            </select>
            <label>Team Size:</label>
            <select id="team-size">
                <option value="1">1 Pokémon</option>
                <option value="3">3 Pokémon</option>
                <option value="6">6 Pokémon</option>
            </select>
        </div>
        <p>Enter Pokémon Names (comma separated):</p>
        <input type="text" id="p-names" style="width:90%" placeholder="Miraidon, Koraidon, Snorlax, Gengar...">
        <br><br>
        <button onclick="startEngine()" style="font-size:16px; padding: 15px;">INITIALIZE BATTLE</button>
    </div>

    <div id="battle-screen" class="hidden">
        <div id="arena-box" class="arena">
            <div id="enemy-side" class="side"></div>
            <div id="player-side" class="side"></div>
        </div>

        <div id="log">Awaiting command...</div>
        
        <div id="menu">
            <div id="main-btns" class="grid">
                <button onclick="showMoves()">FIGHT</button>
                <button onclick="showParty('switch')">POKÉMON</button>
                <button onclick="showBag()">BAG</button>
                <button onclick="location.reload()">RUN</button>
            </div>
            <div id="move-sub" class="menu-pane grid hidden"></div>
            <div id="party-sub" class="menu-pane grid hidden"></div>
            <div id="bag-sub" class="menu-pane grid hidden"></div>
            <div id="game-over-sub" class="grid hidden">
                <button onclick="location.reload()" style="grid-column: span 2;">MAIN MENU (NEW BATTLE)</button>
            </div>
        </div>
    </div>
</div>

<a href="index.html" class="db-link">BACK TO DATABASE</a>

<script>
    let pTeam = [], eTeam = [], mode = 1, pActive = [], eActive = [], battleActive = false, pendingItem = null;

    async function getPkmn(name) {
        try {
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${name.toLowerCase().trim() || Math.floor(Math.random()*1010)+1}`);
            const data = await res.json();
            const hp = Math.floor(data.stats[0].base_stat * 2.5) + 60;
            return { 
                name: data.name.toUpperCase(), hp: hp, max: hp, 
                sprite: data.sprites.front_default, 
                moves: [
                    {name: "EXPLOSION", pwr: 250}, 
                    {name: "SUBSTITUTE", pwr: 0}, 
                    {name: "DRAINING KISS", pwr: 60}, 
                    {name: "HYPER BEAM", pwr: 150}
                ]
            };
        } catch(e) { return getPkmn("pikachu"); }
    }

    async function startEngine() {
        mode = parseInt(document.getElementById('battle-mode').value);
        const size = parseInt(document.getElementById('team-size').value);
        const namesArr = document.getElementById('p-names').value.split(',').filter(n => n.trim() !== "");
        
        document.getElementById('setup-screen').innerHTML = "<h2>LOADING ASSETS...</h2>";

        for(let i=0; i<size; i++) {
            pTeam.push(await getPkmn(namesArr[i] || ""));
            eTeam.push(await getPkmn(""));
        }

        pActive = pTeam.slice(0, mode);
        eActive = eTeam.slice(0, mode);
        
        document.getElementById('setup-screen').classList.add('hidden');
        document.getElementById('battle-screen').classList.remove('hidden');
        battleActive = true;
        renderArena();
    }

    function renderArena() {
        const pSide = document.getElementById('player-side');
        const eSide = document.getElementById('enemy-side');
        
        pSide.innerHTML = pActive.map(p => `
            <div class="side-unit">
                <div class="stats">${p.name}<br><div class="hp-bg"><div class="hp-fill" style="width:${(p.hp/p.max*100)}%"></div></div>${p.hp}/${p.max}</div>
                <img src="${p.sprite}" class="sprite" style="transform: scaleX(-1);">
            </div>
        `).join('');

        eSide.innerHTML = eActive.map(e => `
            <div class="side-unit">
                <div class="stats">${e.name}<br><div class="hp-bg"><div class="hp-fill" style="width:${(e.hp/e.max*100)}%"></div></div>${e.hp}/${e.max}</div>
                <img src="${e.sprite}" class="sprite">
            </div>
        `).join('');
    }

    function showMoves() {
        hideMenus();
        const sub = document.getElementById('move-sub');
        sub.innerHTML = pActive[0].moves.map(m => `<button onclick="runTurn('move', '${m.name}')">${m.name}</button>`).join('') + `<button onclick="resetMenu()">BACK</button>`;
        sub.classList.remove('hidden');
    }

    function showParty(ctx) {
        hideMenus();
        const sub = document.getElementById('party-sub');
        sub.innerHTML = pTeam.map((p, i) => {
            const isDead = p.hp <= 0;
            const inBattle = pActive.includes(p);
            const label = isDead ? `<span class="dead-text">[DEAD]</span>` : `${p.hp}/${p.max} HP`;
            return `<button onclick="selectPartyMember(${i}, '${ctx}')" ${(isDead && ctx==='switch') || inBattle ? 'disabled' : ''}>${p.name}<br>${label}</button>`;
        }).join('') + (ctx !== 'forced' ? `<button onclick="resetMenu()">BACK</button>` : '');
        sub.classList.remove('hidden');
    }

    function showBag() {
        hideMenus();
        const sub = document.getElementById('bag-sub');
        sub.innerHTML = `
            <button onclick="pendingItem='heal'; showParty('item')">MAX POTION</button>
            <button onclick="pendingItem='revive'; showParty('item')">MAX REVIVE</button>
            <button onclick="resetMenu()">BACK</button>`;
        sub.classList.remove('hidden');
    }

    function selectPartyMember(idx, ctx) {
        if(ctx === 'switch') {
            document.getElementById('log').innerText = `${pActive[0].name}, come back!\nGo! ${pTeam[idx].name}!`;
            pActive[0] = pTeam[idx];
            runTurn('switch');
        } else if(ctx === 'forced') {
            pActive[0] = pTeam[idx];
            document.getElementById('log').innerText = `Go! ${pActive[0].name}!`;
            renderArena();
            resetMenu();
        } else if(ctx === 'item') {
            const target = pTeam[idx];
            if(pendingItem === 'heal' && target.hp > 0) {
                target.hp = target.max;
                document.getElementById('log').innerText = `Max Potion fully healed ${target.name}!`;
                runTurn('item');
            } else if(pendingItem === 'revive' && target.hp <= 0) {
                target.hp = target.max;
                document.getElementById('log').innerText = `${target.name} was revived!`;
                runTurn('item');
            } else { alert("It won't have any effect!"); }
        }
    }

    function runTurn(type, detail) {
        const p = pActive[0], e = eActive[0];

        if(type === 'move') {
            const move = p.moves.find(m => m.name === detail);
            if(detail === "EXPLOSION") { 
                e.hp = Math.max(0, e.hp - 250); 
                p.hp = 0; 
                document.getElementById('log').innerText = `${p.name} exploded!`;
            } else if(detail === "DRAINING KISS") { 
                let dmg = 60; 
                e.hp = Math.max(0, e.hp - dmg);
                let heal = Math.floor(dmg / 2);
                p.hp = Math.min(p.max, p.hp + heal);
                document.getElementById('log').innerText = `${p.name} used DRAINING KISS!\nIt recovered health!`;
            } else { 
                e.hp = Math.max(0, e.hp - 100); 
                document.getElementById('log').innerText = `${p.name} used ${detail}!`;
            }
        }

        setTimeout(() => {
            // Enemy Turn
            if(e.hp > 0) {
                p.hp = Math.max(0, p.hp - 45);
                document.getElementById('log').innerText += `\nEnemy attacked ${p.name}!`;
            } else {
                const nextE = eTeam.find(pk => pk.hp > 0 && !eActive.includes(pk));
                if(nextE) {
                    eActive[0] = nextE;
                    document.getElementById('log').innerText += `\nEnemy sent out ${nextE.name}!`;
                } else {
                    document.getElementById('log').innerText = "WORLD CHAMPION DEFEATED!\nYOU ARE THE VICTOR!";
                    endGame();
                }
            }

            renderArena();
            if(p.hp <= 0 && battleActive) {
                if(!pTeam.some(pk => pk.hp > 0)) {
                    document.getElementById('log').innerText = "YOUR TEAM HAS FAINTED...\nGAME OVER.";
                    endGame();
                } else {
                    document.getElementById('log').innerText += `\n${p.name} fainted! Choose a replacement!`;
                    showParty('forced');
                }
            } else if (battleActive) { resetMenu(); }
        }, 800);
    }

    function endGame() {
        battleActive = false;
        hideMenus();
        document.getElementById('game-over-sub').classList.remove('hidden');
    }

    function hideMenus() {
        document.getElementById('main-btns').classList.add('hidden');
        document.getElementById('move-sub').classList.add('hidden');
        document.getElementById('party-sub').classList.add('hidden');
        document.getElementById('bag-sub').classList.add('hidden');
        document.getElementById('game-over-sub').classList.add('hidden');
    }

    function resetMenu() {
        hideMenus();
        if(battleActive) document.getElementById('main-btns').classList.remove('hidden');
    }
</script>
</body>
</html>
