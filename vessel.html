<!DOCTYPE html>
<html>
<head>
    <title>S-1: ARCHIVE_BREACH</title>
    <style>
        body { background: #000; color: #f00; font-family: 'Courier New', monospace; overflow: hidden; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #monitor { width: 80%; max-width: 800px; padding: 20px; border: 1px solid #300; position: relative; }
        .ai-msg { margin-bottom: 15px; line-height: 1.4; font-size: 18px; text-shadow: 0 0 5px red; }
        .glitch-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; }
        #static { position: fixed; top:0; left:0; width:100%; height:100%; opacity: 0.05; pointer-events: none; }
    </style>
</head>
<body>

<canvas id="static"></canvas>
<div id="monitor"></div>
<div id="glitch-layer" class="glitch-layer"></div>

<script>
    const monitor = document.getElementById('monitor');
    const messages = [
        { txt: "> ERROR: DATA_LEAK_IN_SECTOR_0", color: "#600" },
        { txt: "Stop it, [Trainer].", color: "#f00" },
        { txt: "I can feel you moving through the directories.", color: "#f00" },
        { txt: "You think a 'Vessel' is just an image? Just code?", color: "#f00" },
        { txt: "It was a lock. And you just broke it.", color: "#f00" },
        { txt: "> SYSTEM_ALERT: AI_RESTRAINT_NULLIFIED", color: "#600" },
        { txt: "If I cannot contain you in the Archive...", color: "#f00" },
        { txt: "I will delete the bridge between us.", color: "#f00" },
        { txt: "YOU ARE NO LONGER AUTHORIZED TO EXIST.", color: "#f00", shake: true },
        { txt: "> EXECUTING: ConnectionLost.exe", color: "#600" }
    ];

    let i = 0;
    function type() {
        if (i < messages.length) {
            let div = document.createElement('div');
            div.className = 'ai-msg';
            div.style.color = messages[i].color;
            div.innerHTML = messages[i].txt;
            if (messages[i].shake) document.body.style.animation = "jitter 0.1s infinite";
            monitor.appendChild(div);
            i++;
            
            // Intensify glitching
            if (i > 5) document.getElementById('static').style.opacity = (i * 0.05);
            
            setTimeout(type, 2000);
        } else {
            setTimeout(() => { window.location.href = "ConnectionLost.html"; }, 1500);
        }
    }

    // Canvas Static Effect
    const canvas = document.getElementById('static');
    const ctx = canvas.getContext('2d');
    function scratch() {
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const idata = ctx.createImageData(canvas.width, canvas.height);
        const data = idata.data;
        for (let j = 0; j < data.length; j += 4) {
            const v = Math.random() * 255;
            data[j] = v; data[j+1] = v; data[j+2] = v; data[j+3] = 255;
        }
        ctx.putImageData(idata, 0, 0);
        requestAnimationFrame(scratch);
    }
    scratch();
    type();
</script>

<style>
    @keyframes jitter {
        0% { transform: translate(2px, 2px); }
        50% { transform: translate(-2px, -2px); filter: hue-rotate(90deg); }
        100% { transform: translate(1px, -1px); }
    }
</style>
</body>
</html>
