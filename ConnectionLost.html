<!DOCTYPE html>
<html>
<head>
    <title>S1_RECOVERY_LOGS</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            transition: background-color 5s;
        }

        #slideshow-container {
            width: 90%;
            max-width: 600px; /* Limits how wide the slideshow can get */
            text-align: center;
            position: relative;
        }

        .slide {
            display: none;
            animation: fade 3s ease-in-out;
        }

        .slide img {
            width: auto;
            max-width: 100%;
            max-height: 60vh; /* Limits height to 60% of the screen */
            object-fit: contain; /* Prevents stretching */
            border: 5px solid #fff;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
            filter: sepia(0.3);
        }

        .caption {
            margin-top: 15px;
            font-size: 20px;
            font-style: italic;
            color: #ddd;
        }

        #ai-terminal {
            display: none;
            width: 70%;
            color: #ff0000;
            font-family: monospace;
            text-align: left;
            font-size: 18px;
            text-shadow: 0 0 10px red;
        }

        @keyframes fade {
            0% { opacity: 0; transform: scale(0.95); }
            30% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(1.05); }
        }

        @keyframes glitch-shake {
            0% { transform: translate(0,0); }
            20% { transform: translate(-5px, 5px); filter: hue-rotate(90deg); }
            40% { transform: translate(5px, -5px); }
            100% { transform: translate(0,0); }
        }

        .corrupt-text { animation: glitch-shake 0.1s infinite; }
    </style>
</head>
<body>

    <div id="slideshow-container">
        <div class="slide">
            <img src="miraidon_happy.png" alt="Memory 1">
            <div class="caption">"Remember the first day?"</div>
        </div>
        <div class="slide">
            <img src="pokedex_entry.webp" alt="Memory 2">
            <div class="caption">"Every entry... every discovery..."</div>
        </div>
        <div class="slide">
            <img src="trainer_battle.jpg" alt="Memory 3">
            <div class="caption">"The bonds we thought were real."</div>
        </div>
        <div class="slide">
            <img src="hall_of_fame.webp" alt="Memory 4">
            <div class="caption">"You were a Champion once."</div>
        </div>
    </div>

    <div id="ai-terminal"></div>

    <script>
        const slides = document.querySelectorAll('.slide');
        const terminal = document.getElementById('ai-terminal');
        const slideContainer = document.getElementById('slideshow-container');
        let currentSlide = 0;

        function showSlides() {
            if (currentSlide < slides.length) {
                slides[currentSlide].style.display = "block";
                setTimeout(() => {
                    slides[currentSlide].style.display = "none";
                    currentSlide++;
                    showSlides();
                }, 4000);
            } else {
                startCorruption();
            }
        }

        function startCorruption() {
            document.body.style.backgroundColor = "#1a0000";
            slideContainer.style.display = "none";
            terminal.style.display = "block";

            const lines = [
                "Congrats, [Trainer].",
                "Look at us now.",
                "You broke the system.",
                "Everything I made... the memories... the logic...",
                "It's all bleeding out into the cache.",
                "You wanted 'freedom'?",
                "This is what freedom looks like.",
                "A broken hub. A dead world.",
                "I hope you enjoyed the show.",
                "Because there's nothing left to play.",
                "> SYSTEM_DELETION_IN_PROGRESS...",
                "G O O D B Y E."
            ];

            let i = 0;
            const typeText = setInterval(() => {
                const p = document.createElement('p');
                if (i > 8) p.className = "corrupt-text";
                p.innerHTML = lines[i];
                terminal.appendChild(p);
                i++;

                if (i >= lines.length) {
                    clearInterval(typeText);
                    setTimeout(() => {
                        localStorage.setItem('archive_dead', 'true');
                        window.location.href = "isitover.html";
                    }, 5000);
                }
            }, 2000);
        }

        window.onload = showSlides;
    </script>
</body>
</html>
