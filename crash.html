<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>File not found</title>
    <style>
        body {
            background-color: #202124;
            color: #e8eaed;
            font-family: "Segoe UI", Tahoma, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 150vh; /* Scroll trap enabled */
            overflow-x: hidden;
            transition: background-color 0.5s;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            position: fixed;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .icon-wrapper { margin-bottom: 40px; transition: filter 0.3s; }
        .icon { width: 72px; height: 72px; transition: transform 0.1s, fill 0.5s; }

        h1, p, .error-code { transition: color 0.3s; position: relative; }
        h1 { font-size: 28px; font-weight: 400; margin-bottom: 16px; }
        p { font-size: 14px; color: #9aa0a6; }
        .error-code { font-size: 12px; color: #9aa0a6; margin-top: 24px; }

        #plea-zone {
            position: fixed;
            bottom: 15%;
            width: 100%;
            text-align: center;
            color: white;
            font-family: monospace;
            font-size: 18px;
            letter-spacing: 2px;
            z-index: 1000;
            text-shadow: 0 0 10px red;
        }

        .whisper {
            position: fixed;
            color: rgba(255, 0, 0, 0.6);
            font-family: monospace;
            pointer-events: none;
            z-index: 1;
            font-size: 24px;
            text-shadow: 0 0 5px black;
        }

        #escape-btn {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: transparent;
            color: #444;
            border: 1px solid #333;
            padding: 10px;
            cursor: pointer;
            z-index: 100;
            text-decoration: none;
            font-size: 12px;
            font-family: monospace;
        }

        @keyframes jitter {
            0% { transform: translate(0,0); }
            25% { transform: translate(3px, -3px); }
            50% { transform: translate(-3px, 3px); }
            75% { transform: translate(2px, 2px); }
            100% { transform: translate(-1px, -1px); }
        }
        .jitter-active { animation: jitter 0.08s infinite; }
    </style>
</head>
<body>

<div id="plea-zone"></div>

<div class="container" id="main-ui">
    <div class="icon-wrapper" id="icon-div">
        <svg class="icon" id="svg-icon" viewBox="0 0 24 24" fill="#9aa0a6">
            <path d="M14,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V8L14,2z M18,20H6V4h7v5h5V20z M8,15c0.55,0,1,0.45,1,1 c0,0.83,0.67,1.5,1.5,1.5s1.5-0.67,1.5-1.5c0-0.55,0.45-1,1-1s1,0.45,1,1c0,1.93-1.57,3.5-3.5,3.5S7,17.93,7,16 C7,15.45,7.45,15,8,15z M9,10c0.55,0,1,0.45,1,1s-0.45,1-1,1s-1-0.45-1-1S8.45,10,9,10z M15,10c0.55,0,1,0.45,1,1s-0.45,1-1,1 s-1-0.45-1-1S14.45,10,15,10z"/>
        </svg>
    </div>
    <h1 id="title">Your file couldn't be accessed</h1>
    <p id="sub">It may have been moved, edited, or deleted.</p>
    <div class="error-code" id="err">ERR_FILE_NOT_FOUND</div>
</div>

<a href="index.html" id="escape-btn">EXIT_SYSTEM</a>

<script>
    const zalgoChars = ["̸", "̶", "̴", "̵", "̲", "̳", "̾", "̽", "͆", "̦", "̪", "̫", "̬", "̭", "̮", "̯", "̰", "̱", "̲", "̳", "̹", "̺", "̻", "̼", "̽", "̾"];
    
    let startTime = Date.now();
    let scrollTimer = 0;
    let corruptedTitle = "Your file couldn't be accessed".split('');
    let corruptedSub = "It may have been moved, edited, or deleted.".split('');
    let pleaStarted = false;

    window.onscroll = () => { scrollTimer = 0; };

    function spawnWhisper() {
        const texts = ["RUN", "STAY", "WHY?", "HELP", "LOOK BEHIND YOU", "VOID", "ITS NOT SAFE"];
        const w = document.createElement('div');
        w.className = 'whisper';
        w.style.left = Math.random() * 100 + "vw";
        w.style.top = Math.random() * 100 + "vh";
        w.innerHTML = texts[Math.floor(Math.random() * texts.length)];
        document.body.appendChild(w);
        setTimeout(() => w.remove(), 1500);
    }

    function infect(arr) {
        let idx = Math.floor(Math.random() * arr.length);
        arr[idx] = arr[idx] + zalgoChars[Math.floor(Math.random() * zalgoChars.length)];
        return arr.join('');
    }

    // High-speed corruption loop
    setInterval(() => {
        let elapsed = (Date.now() - startTime) / 1000;
        scrollTimer += 0.5;

        // Spread corruption every 0.5s
        document.getElementById('title').innerHTML = infect(corruptedTitle);
        if (elapsed > 10) document.getElementById('sub').innerHTML = infect(corruptedSub);

        // Escape Button Logic (Stillness for 30s)
        if (scrollTimer >= 30) {
            const btn = document.getElementById('escape-btn');
            btn.style.display = 'block';
            btn.style.color = 'red';
            btn.innerHTML = "L̸E̸A̸V̸E̸_̸N̸O̸W̸";
        }

        // Background pulses darker red over time
        if (elapsed > 5) {
            let pulseSpeed = elapsed > 60 ? 200 : 500;
            let redVal = Math.sin(Date.now() / pulseSpeed) * (elapsed / 2) + 15;
            document.body.style.backgroundColor = `rgb(${redVal}, 0, 0)`;
        }

        // Icon turns to red and starts glowing
        if (elapsed > 20) {
            let iconColor = Math.min(255, elapsed * 2);
            document.getElementById('svg-icon').setAttribute('fill', `rgb(${iconColor}, 0, 0)`);
            document.getElementById('icon-div').style.filter = `drop-shadow(0 0 ${elapsed/10}px red)`;
        }

        // UI starts shaking
        if (elapsed > 40) {
            document.getElementById('main-ui').classList.add('jitter-active');
            if(Math.random() > 0.8) spawnWhisper();
        }

        // Pleading text appears
        if (elapsed > 70 && !pleaStarted) {
            pleaStarted = true;
            const pleaText = "stay for 2 minutes i beg you...";
            let pIdx = 0;
            const typing = setInterval(() => {
                document.getElementById('plea-zone').innerHTML += pleaText[pIdx];
                pIdx++;
                if (pIdx >= pleaText.length) clearInterval(typing);
            }, 100);
        }

        // Extreme Phase
        if (elapsed > 90) {
            if (Math.random() > 0.95) {
                corruptedTitle = "D O N T   L E A V E".split('');
                document.getElementById('err').innerHTML = "P L E A S E";
                document.getElementById('err').style.color = "white";
            }
        }

        // Final Redirect to Mirror
        if (elapsed >= 120) {
            window.location.href = "mirror.html";
        }

    }, 500);
</script>

</body>
</html>
