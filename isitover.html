body {

  background-size: cover;

.header {
  display:flex;
  justify-content:space-between;
  align-items:center;

.logo-left { height:60px; }

.container {

.title {
  font-size:32px;
  margin-bottom:30px;
  text-align:center;
  color:#111;
  text-shadow: 1px 1px 2px white;

.gen-list {
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:30px;
  justify-items:center;
}

.generation {
  padding:25px 15px;
  width:180px;
  background:rgba(255,255,255,0.95);
  border-left:6px solid #3B82F6;
  cursor:pointer;
  text-align:center;
  font-weight:bold;
  font-size:18px;
  border-radius:15px;
  box-shadow:0 6px 15px rgba(0,0,0,0.2);
  transition: transform 0.2s, background 0.2s;
}

.generation:hover {
  transform: translateY(-6px);
  background: rgba(240, 246, 255, 1);
}

.note {
  font-size:12px;
  color:#555;
  margin-top:6px;
  font-weight: normal;
}

/* Generation colors */
.gen1 { border-left-color:#3B82F6; } 
.gen2 { border-left-color:#34D399; } 
.gen3 { border-left-color:#FBBF24; } 
.gen4 { border-left-color:#F472B6; } 
.gen5 { border-left-color:#F87171; } 
.gen6 { border-left-color:#A78BFA; } 
.gen7 { border-left-color:#10B981; } 
.gen8 { border-left-color:#F59E0B; } 
.gen9 { border-left-color:#7C3AED; } 
.gen10, .gen11, .gen12 { border-left-color:#9CA3AF; } 

/* Special Feature Buttons */
.type-chart { border-left-color:#EF4444; background: rgba(255, 241, 242, 0.95); } 
.battle-sim { border-left-color:#000000; background: rgba(155, 188, 15, 0.95); color: #0f380f; } 

/* --- GENERATION -1 GLITCH BUTTON SECTION --- */

.glitch-container {
  grid-column: 1 / -1; /* Makes it span the full width of the grid */
  display: flex;
  justify-content: center;
  margin-top: 50px;
  padding-bottom: 50px;
}

.gen-negative {
  position: relative;
  background: #000;
  color: #00ff00;
  font-family: 'Courier New', monospace;
  padding: 20px 40px;
  font-size: 22px;
  border: 2px solid #00ff00;
  cursor: pointer;
  text-transform: uppercase;
  overflow: hidden;
  box-shadow: 0 0 10px rgba(0, 255, 0, 0.3);
}

/* The glitching text effect */
.gen-negative::before, .gen-negative::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
}

.gen-negative::before {
  left: 2px;
  text-shadow: -2px 0 #ff00c1;
  clip: rect(44px, 450px, 56px, 0);
  animation: glitch-anim 5s infinite linear alternate-reverse;
}

.gen-negative::after {
  left: -2px;
  text-shadow: -2px 0 #00fff9, 2px 2px #ff00c1;
  animation: glitch-anim2 1s infinite linear alternate-reverse;
}

@keyframes glitch-anim {
  0% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
  5% { clip: rect(70px, 9999px, 71px, 0); transform: skew(0.15deg); }
  10% { clip: rect(10px, 9999px, 33px, 0); transform: skew(0.55deg); }
  15% { clip: rect(80px, 9999px, 100px, 0); transform: skew(0.35deg); }
  20% { clip: rect(50px, 9999px, 20px, 0); transform: skew(0.95deg); }
  100% { clip: rect(31px, 9999px, 94px, 0); transform: skew(0.85deg); }
}

@keyframes glitch-anim2 {
  0% { clip: rect(60px, 9999px, 52px, 0); transform: skew(0.1deg); }
  20% { clip: rect(20px, 9999px, 30px, 0); transform: skew(0.5deg); }
  40% { clip: rect(10px, 9999px, 90px, 0); transform: skew(0.2deg); }
  60% { clip: rect(80px, 9999px, 10px, 0); transform: skew(0.8deg); }
  80% { clip: rect(40px, 9999px, 60px, 0); transform: skew(0.4deg); }
  100% { clip: rect(90px, 9999px, 20px, 0); transform: skew(0.3deg); }
}

.gen-negative:hover {
  background: #00ff00;
  color: #000;
  transition: 0.1s;
}

.gen-negative:hover::before, .gen-negative:hover::after {
  display: none; /* Stops the text glitch so the text is readable on hover */
}
