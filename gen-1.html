<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>VOID_DIRECTORY_[-1]</title>
    <style>
        :root {
            --glitch-red: #ff0000;
            --dark-red: #350000;
            --void-bg: #000000;
        }

        body {
            background-color: var(--void-bg);
            color: #8b0000;
            font-family: 'Courier New', monospace;
            margin: 0;
            overflow-x: hidden;
            background-image: 
                linear-gradient(rgba(139, 0, 0, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(139, 0, 0, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transition: background-color 2s;
        }

        #creepy-overlay {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
            pointer-events: none;
            font-size: 5vw;
            color: rgba(255, 0, 0, 0); 
            text-align: center;
            white-space: pre-wrap;
            animation: twitch 0.05s infinite;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.5);
        }

        @keyframes twitch {
            0% { transform: translate(-52%, -48%); }
            25% { transform: translate(-49%, -51%); }
            50% { transform: translate(-51%, -49%); }
            75% { transform: translate(-48%, -52%); }
            100% { transform: translate(-50%, -50%); }
        }

        .header {
            position: sticky; top: 0; z-index: 50;
            background: #000; border-bottom: 2px solid #5a0000;
            padding: 15px; text-align: center;
        }

        .pokedex-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px; padding: 25px;
        }

        .glitch-card {
            background: #050000;
            border: 1px solid var(--dark-red);
            padding: 12px;
            text-decoration: none;
            color: #8b0000;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.1s;
        }

        .glitch-card:hover {
            border-color: #ff0000;
            background: #1a0000;
            color: #ff0000;
        }

        .sprite-box {
            width: 60px; height: 60px;
            background: #000; border: 1px solid #4a0000;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; margin-bottom: 8px;
        }

        .nav-back {
            color: #5a0000; text-decoration: none; font-size: 11px;
            border: 1px solid #5a0000; padding: 5px 12px;
            cursor: pointer;
        }

        .terminate-container {
            text-align: center;
            padding: 100px 0;
            background: linear-gradient(transparent, #1a0000);
        }

        .terminate-btn {
            display: inline-block;
            color: #ff0000;
            font-size: 24px;
            font-weight: bold;
            text-decoration: none;
            padding: 15px 40px;
            border: 3px solid #ff0000;
            background: transparent;
            text-transform: uppercase;
            letter-spacing: 5px;
            transition: all 0.1s;
            cursor: pointer;
            box-shadow: 0 0 15px #8b0000;
        }

        #achievement-popup {
            position: fixed;
            top: 20px;
            right: -450px;
            width: 320px;
            height: 70px;
            background: #222;
            border: 4px solid #000;
            outline: 2px solid #555;
            display: flex;
            align-items: center;
            padding: 10px;
            z-index: 10000;
            transition: right 0.6s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            box-shadow: 10px 10px 0px rgba(0,0,0,0.5);
            pointer-events: none;
        }
        #achievement-popup.show { right: 20px; }
        .ach-icon { width: 50px; height: 50px; border: 2px solid #444; background: #000; display: flex; align-items: center; justify-content: center; }
        .ach-icon img { width: 100%; filter: sepia(100%) saturate(500%) hue-rotate(-50deg); }
        .ach-text { margin-left: 15px; }
        .ach-title { color: #ffff00; font-size: 14px; font-weight: bold; margin: 0; }
        .ach-desc { color: #ffffff; font-size: 11px; margin: 3px 0 0 0; }
    </style>
</head>
<body>

<div id="achievement-popup">
    <div class="ach-icon">
        <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    </div>
    <div class="ach-text">
        <p class="ach-title">Bad Ending 3/10!</p>
        <p class="ach-desc">They're all dead thanks to you.</p>
    </div>
</div>

<div id="creepy-overlay">RUN</div>

<div class="header">
    <h2 id="secretReset" title="Double click to debug/reset" style="margin:0; font-size: 18px; color: #4a0000; cursor: crosshair;">[ SECTOR_-1_ILLEGAL_ACCESS ]</h2>
    <h3 id="status-text" style="margin:0; font-size: 14px; color: #4a0000;">There's easter eggs!</h3>
    <a href="javascript:void(0)" id="topExitBtn" onclick="handleExitAttempt(this)" class="nav-back">EXIT??</a>
</div>

<div class="pokedex-grid" id="voidGrid"></div>

<div class="terminate-container">
    <a href="javascript:void(0)" id="termBtn" onclick="handleTerminate(this)" class="terminate-btn">СӮС”СҸРјО№О·ОұСӮС” Ж’О№в„“С”</a>
</div>

<script>
// --- 1. CORE STATE ---
let totalTerminations = parseInt(localStorage.getItem('termCount')) || 0;
let lockStatus = localStorage.getItem('voidLocked') || 'false'; 
let isWaiting = false;

// SECRET RESET (Double click the header title)
document.getElementById('secretReset').ondblclick = function() {
    localStorage.clear();
    alert("SYSTEM_REBOOTED: All progress wiped.");
    location.reload();
};

window.onload = function() {
    if (!localStorage.getItem('ach_ending_3')) {
        localStorage.setItem('ach_ending_3', 'true');
        const popup = document.getElementById('achievement-popup');
        setTimeout(() => {
            popup.classList.add('show');
            setTimeout(() => { popup.classList.remove('show'); }, 6000);
        }, 1500);
    }
};

// --- 2. TERMINATE LOGIC (RE-ORDERED TO PREVENT STICKING) ---
function handleTerminate(el) {
    // If they are in the PERMANENT loop, skip to stillness
    if (lockStatus === 'permanent') {
        alert("Oh oh oh.. going so soon?");
        startStillnessChallenge();
        return;
    }

    // Step 1: Increment count
    totalTerminations++;
    localStorage.setItem('termCount', totalTerminations.toString());

    // Step 2: Check standard progression alerts
    if (totalTerminations === 5) {
        alert("You really think i would forget?");
        window.location.href = "index.html";
        return;
    } 
    else if (totalTerminations === 8) {
        alert("Stop... i know what your trying to do, and i won't let you");
        window.location.href = "index.html";
        return;
    } 
    else if (totalTerminations >= 10) {
        // Only set lockStatus if it hasn't happened yet
        if (lockStatus === 'false') {
            localStorage.setItem('voidLocked', 'true');
            alert("I WARNED YOU.");
            location.reload();
            return;
        }
    }

    // Step 3: Handle the hint if they are locked out (Part 3)
    if (lockStatus === 'true') {
        alert("Your exit is hidden within the infinite of space, but if doubles and stood upright");
        return;
    }

    // Default exit
    window.location.href = "index.html";
}

function startStillnessChallenge() {
    const statusText = document.getElementById('status-text');
    statusText.innerHTML = "DON'T MOVE.";
    statusText.style.fontSize = "24px";
    statusText.style.color = "red";
    let secondsStill = 0;
    const challenge = setInterval(() => {
        secondsStill++;
        if (secondsStill >= 10) {
            clearInterval(challenge);
            const endings = ["memory_leak.html", "human_error.html", "void_callback.html", "unhandled_exception.html"];
            window.location.href = endings[Math.floor(Math.random() * endings.length)];
        }
    }, 1000);
    window.onmousemove = () => { if (secondsStill > 0 && secondsStill < 10) secondsStill = 0; };
}

function handleExitAttempt(el) {
    if (isWaiting || lockStatus !== 'false') return;
    isWaiting = true;
    el.innerHTML = "ACCESS_DENIED";
    setTimeout(() => { el.innerHTML = "EXIT??"; isWaiting = false; }, 1000);
}

const grid = document.getElementById('voidGrid');
const symbols = ["?", "Гҳ", "вҖ ", "ОЈ", "X", "в–‘", "в–“", "NaN", "р’Җұ", "р’„Ҷ"];

for (let i = 1; i <= 200; i++) {
    const id = i.toString().padStart(4, '0');
    const card = document.createElement('a');
    card.className = 'glitch-card';
    if (id === "0088") {
        card.href = "javascript:void(0)";
        card.onclick = () => {
            if (lockStatus === 'true') {
                alert("PROTOCOL_DECRYPTED: EXIT_GRANTED");
                setTimeout(() => {
                    alert("You Idiot... you really thought it would be that easy?");
                    localStorage.setItem('voidLocked', 'permanent');
                    location.reload();
                }, 500);
            }
        };
    } else { card.href = `-${id}.html`; }

    const symbol = symbols[Math.floor(Math.random() * symbols.length)];
    card.innerHTML = `<div class="sprite-box">${symbol}</div><div class="id-num"># -${id}</div><div class="name-err">VOID_ENTRY</div>`;
    grid.appendChild(card);
}

if (lockStatus === 'true' || lockStatus === 'permanent') {
    document.getElementById('status-text').innerHTML = "YOU ARE NOT LEAVING.";
    document.getElementById('topExitBtn').style.display = 'none';
    if (lockStatus === 'permanent') {
        document.body.style.backgroundColor = "#1a0000";
        document.getElementById('termBtn').innerHTML = "STAY.";
        const whispers = ["I see you", "Still here?", "Don't leave me...", "It's cold out there"];
        setInterval(() => { document.getElementById('status-text').innerHTML = whispers[Math.floor(Math.random() * whispers.length)]; }, 8000);
    }
}

    "рҗӢ…бҢҺрҗҢғбү№", "еҮ г„– г„’г„©е°әеҮ дёЁеҮ бҺ¶ д№ғеҚӮеҢҡТң", "RМ¶UМ¶NМ¶", "в„Ӣв„җрқ’ҹв„°", "рқҗҚвғҘрқҗҺвғҘ рқҗ„вғҘрқҗ’вғҘрқҗӮвғҘрқҗҖвғҘрқҗҸвғҘрқҗ„вғҘ",

    "рҹ„ёрҹ„ірҹ„ҙрҹ„·", "еҮ Пғ пҪ”аёўб–ҮеҮ ОҜеҮ п»® в’·рқ•’рҹ…Ірқ“ҡ", "RМ·UМ·NМ·", "рқ’ўрқ’Әрқ’Әрқ’ҹ в„’рқ’°рқ’һрқ’Ұ", "HМ·МӣМүIМөН—Н‘DМөМҺНқEМёМҪН—",

    "RМ¶М–Н•МҖН’...", "рқ•ірқ•ҙрқ•Ҝрқ•°", "рқҗҚрқҗҺ рқҗ„рқҗ’рқҗӮрқҗҖрқҗҸрқҗ„", "РҹУЁ Ж¬РҰРҜРҹIРҹG BОӣб„ғK", "вӢҠЖҶUв…ғ б—ЎOOбҺ®",

    "HН“МҪIН“МҪDН“МҪEН“МҪ", "рқҗҶрқҗҺрқҗҺрқҗғ рқҗӢрқҗ”рқҗӮрқҗҠ", "NМёOМё МёTМёUМёRМёNМёIМёNМёGМё МёBМёAМёCМёKМё", "в“Үв“Ҡв“ғ", "рқ“Ўрқ“Өрқ“қ",
    "HН IН DН EН ", "вӮҰГҳ ЙҶвӮҙвӮөвӮівӮұЙҶ", "GМҙOМҙOМҙDМҙ МҙLМ¶UМ¶CМ¶KМҙ", "РҜЖұРҹ", "рҹ„Ҫрҹ„ҫ рҹ…ғрҹ…„рҹ…Ғрҹ„Ҫрҹ„ёрҹ„Ҫрҹ„ҝ рҹ„ұрҹ„°рҹ„Ірҹ„ә",

    if (scrollPercent > 0.05) {
        overlay.innerHTML = horrorPhrases[Math.floor(Math.random() * horrorPhrases.length)];
        overlay.style.color = `rgba(255, 0, 0, ${scrollPercent})`;
    }
}, 250);
